services:
  mysql-master:
    image: mysql:8.0
    container_name: mysql-master
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ./master/data:/var/lib/mysql
      - ./master/conf:/etc/mysql/conf.d
      - ./master/init:/docker-entrypoint-initdb.d
    networks:
      - mysql-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 3
    command: 
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=row
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON

  mysql-slave:
    image: mysql:8.0
    container_name: mysql-slave
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - ./slave/data:/var/lib/mysql
      - ./slave/conf:/etc/mysql/conf.d
      - ./slave/init:/docker-entrypoint-initdb.d
    networks:
      - mysql-network
    depends_on:
      mysql-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "mysql -u root -p${MYSQL_ROOT_PASSWORD} -e 'SHOW REPLICA STATUS\\G' | grep -q 'Replica_IO_Running: Yes' && mysql -u root -p${MYSQL_ROOT_PASSWORD} -e 'SHOW REPLICA STATUS\\G' | grep -q 'Replica_SQL_Running: Yes'"]
      start_period: 60s
      interval: 15s
      timeout: 10s
      retries: 5
    command:
      - --server-id=2
      - --log-bin=mysql-bin
      - --binlog-format=row
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON

  seeder:
    build: ../../src
    container_name: seeder
    depends_on:
      mysql-master:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql-master
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    command: ["python", "seeders/main.py", "100000"]
    networks:
      - mysql-network
    restart: on-failure:3

networks:
  mysql-network:
    driver: bridge